# Postgres + Redis trên VPS (chỉ bind localhost — không mở ra internet).
# App Next.js chạy ngoài compose (PM2/systemd), kết nối qua 127.0.0.1.
#
# Khởi động:
#   docker compose -f docker-compose.prod.yml up -d
#
# DATABASE_URL=postgresql://housex:CHANGE_ME@127.0.0.1:5432/housex?schema=public
# REDIS_URL=redis://127.0.0.1:6379

name: housex-prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: housex-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: housex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      POSTGRES_DB: housex
    volumes:
      - housex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housex -d housex"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: housex-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - housex_redis_data:/data

volumes:
  housex_pg_data:
  housex_redis_data:
